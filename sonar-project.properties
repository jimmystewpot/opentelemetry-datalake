sonar.projectKey=jimmystewpot_opentelemetry-datalake
sonar.organization=jimmystewpot


# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=opentelemetry-datalake
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Python analysis configuration
sonar.python.version=3.11

# Define source and test directories
sonar.sources=src, crates
sonar.tests=tests

# Exclude virtual environments and build artifacts from scanning
sonar.exclusions=**/.*, **/target/**, **/venv/**, **/.venv/**, tests/e2e/.venv/**

# Disable PL/SQL analysis on .sql files to avoid PL/SQL Data Dictionary warnings
sonar.plsql.file.suffixes=-