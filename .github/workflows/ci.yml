name: 🧪 CI & 🚀 Deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # --- FAST PATH GATES ---

  fmt:
    name: Code Formatting
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt
          cache: false
      - name: cargo fmt
        run: cargo fmt --all -- --check

  lint:
    name: Lint Check
    needs: [fmt]
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: clippy
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "lint"

      - name: cargo clippy
        # Use --no-deps for speed in the fast path gate
        run: cargo clippy --workspace --all-features --all-targets --no-deps -- -D warnings

  unit-test:
    needs: [fmt]
    name: Unit Test
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "unit-test-no-cov"

      - name: cargo unit tests
        # No coverage instrumentation here for maximum speed in the fast path
        run: cargo test --workspace --all-features --lib --bins

  # --- ASYNC QUALITY GATES ---

  coverage:
    needs: [lint, unit-test]
    name: Code Coverage
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: llvm-tools-preview
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "coverage"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048 # cargo-llvm-cov

      - name: cargo coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  smoke-test:
    needs: [lint, unit-test]
    name: Smoke Test (Integration)
    runs-on: arc-runner-set
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "smoke-test"

      - name: cargo smoke test (integration)
        run: cargo test --workspace --all-features --tests

  bench:
    needs: [lint, unit-test]
    name: Benchmarks
    runs-on: arc-runner-set
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "benchmarks"

      - name: cargo bench (smoke test)
        run: cargo bench --workspace --all-features -- --test

  deny:
    needs: [lint, unit-test]
    name: License & Advisory Check
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@b41f205986c29b4c1e4ee66c25d5c88b1624ccb9 # cargo-deny

      - name: cargo deny (advisories)
        run: cargo deny check advisories

      - name: cargo deny (licenses)
        run: cargo deny check licenses

  doc:
    needs: [lint, unit-test]
    name: Documentation
    runs-on: ${{ github.actor == 'dependabot[bot]' && 'ubuntu-latest' || 'arc-runner-set' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "doc"

      - name: cargo doc
        run: cargo doc --no-deps --workspace --all-features

  e2e-test:
    needs: [lint, unit-test]
    name: End-to-End Test
    runs-on: arc-runner-set
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config g++ \
            libcurl4-openssl-dev libssl-dev \
            protobuf-compiler libsasl2-dev \
            build-essential python3-venv docker-compose-v2 docker.io

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          shared-key: "e2e-test"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Run E2E Test Suite
        run: make e2e-test
